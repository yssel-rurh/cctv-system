<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTV AI Security System - Login</title>
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/variable.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/component.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Login Page Specific Styles -->
  <style>
    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--spacing-lg);
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: var(--spacing-xl);
      background-color: var(--bg-secondary);
      border-radius: var(--border-radius-lg);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
    }
    .login-header { text-align: center; margin-bottom: var(--spacing-xl); }
    .login-logo { font-size: 3rem; margin-bottom: var(--spacing-sm); }
    .login-title { font-size: var(--font-size-xl); color: var(--accent-primary); margin-bottom: var(--spacing-xs); font-weight: 700; }
    .login-subtitle { color: var(--text-secondary); font-size: var(--font-size-sm); }
    .form-group { margin-bottom: var(--spacing-md); }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--accent-primary); }
    .btn {
      width: 100%;
      padding: 12px;
      background-color: var(--accent-primary);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover { background-color: var(--accent-hover); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .alert {
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--border-radius);
      margin-bottom: var(--spacing-md);
      border-left: 4px solid;
    }
    .alert-danger { background-color: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger); }
    .alert-warning { background-color: rgba(245, 158, 11, 0.1); border-color: var(--warning); color: var(--warning); }
    .login-demo {
      margin-top: var(--spacing-lg);
      padding: var(--spacing-md);
      background-color: var(--bg-primary);
      border-radius: var(--border-radius);
      font-size: 0.875rem;
    }
    .login-demo summary { cursor: pointer; color: var(--text-secondary); font-weight: 500; }
    .login-demo p { margin: 4px 0; color: var(--text-muted); }
    .login-demo code {
      background-color: var(--bg-tertiary, #334155);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.75rem;
    }
    .hidden { display: none !important; }
  </style>
</head>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo"> </div>
      <h1 class="login-title">CCTV AI Security System</h1>
      <p class="login-subtitle">Secure Access Portal</p>
    </div>
    
    <div id="login-error" class="alert alert-danger hidden"></div>
    <div id="login-demo-warning" class="alert alert-warning hidden">
        Backend offline. Using demo mode.
    </div>
    
    <form id="login-form" class="login-form">
      <div class="form-group">
        <label for="username">📧 username </label>
        <input type="text" id="username" name="text" placeholder="admin@cctv.com" required autocomplete="email"/>
      </div>
      
      <div class="form-group">
        <label for="password">🔒 Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      
      <button type="submit" class="btn" id="submit-btn">🔐 Sign In</button>
    </form>
    
    <details class="login-demo">
      <summary>🔍 Demo Credentials (Click to View)</summary>
      <p><strong>Admin:</strong> <code>admin@cctv.com</code> / <code>admin123</code></p>
      <p><strong>Officer:</strong> <code>officer@cctv.com</code> / <code>officer123</code></p>
      <p><strong>Viewer:</strong> <code>viewer@cctv.com</code> / <code>viewer123</code></p>
    </details>
  </div>
  
  <!-- INLINE JAVASCRIPT - No modules, no imports -->
  <script>
    // Demo users database
    const DEMO_USERS = {
      'admin@cctv.com': { password: 'admin123', role: 'admin', name: 'Security Admin', id: 1 },
      'officer@cctv.com': { password: 'officer123', role: 'officer', name: 'Security Officer', id: 2 },
      'viewer@cctv.com': { password: 'viewer123', role: 'viewer', name: 'Viewer', id: 3 }
    };
    
    // Role permissions
    const ROLE_PERMISSIONS = {
      admin: ['dashboard', 'live', 'playback', 'cameras', 'users', 'settings'],
      officer: ['dashboard', 'live', 'playback'],
      viewer: ['dashboard', 'live']
    };
    
    // Check if already logged in
    const token = localStorage.getItem('cctv_token');
    const userStr = localStorage.getItem('cctv_user');
    if (token && userStr) {
      window.location.href = 'app.html#dashboard';
    }
    
    // Handle login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      const submitBtn = document.getElementById('submit-btn');
      
      errorEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Signing in...';
      
      try {
        // Try backend first
        let result = null;
        try {
          const response = await fetch('http://10.251.83.27:8000/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          result = await response.json();
        } catch (err) {
          console.log('Backend offline, using demo mode');
        }
        
        if (result?.access_token) {
          // Backend login successful
          const user = result.user || { email, role: 'officer', name: email.split('@')[0] };
          localStorage.setItem('cctv_token', result.access_token);
          localStorage.setItem('cctv_user', JSON.stringify(user));
          
          // ✅ REDIRECT BASED ON ROLE
          if (user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'officer.html';
          }
        } else {
          // Demo fallback
          const demoUsers = {
            'admin@cctv.com': { role: 'admin', name: 'Security Admin' },
            'officer@cctv.com': { role: 'officer', name: 'Security Officer' },
            'viewer@cctv.com': { role: 'viewer', name: 'Viewer' }
          };
          
          const demoUser = demoUsers[email];
          if (demoUser && password === (email.includes('admin') ? 'admin123' : 'officer123')) {
            const user = { ...demoUser, email };
            localStorage.setItem('cctv_token', 'demo-token');
            localStorage.setItem('cctv_user', JSON.stringify(user));
            
            // ✅ REDIRECT BASED ON ROLE
            if (user.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'officer.html';
            }
          } else {
            errorEl.textContent = '❌ Invalid credentials';
            errorEl.classList.remove('hidden');
          }
        }
      } catch (error) {
        errorEl.textContent = 'An error occurred. Please try again.';
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '🔐 Sign In';
      }
    });
  </script>
</body>
</html>
