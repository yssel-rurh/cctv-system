<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTV AI Security System - Admin Dashboard</title>
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/variable.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/component.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🎥 CCTV AI System</div>
        <div style="font-size:0.75rem;color:var(--text-secondary);margin-top:4px">v2.0.0</div>
      </div>
      <div class="user-profile">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Loading...</div>
          <div class="user-role" id="user-role">ADMIN</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <button class="nav-link active" data-page="dashboard" onclick="navigate('dashboard')">
          <span class="nav-link-icon">📊</span>
          <span class="nav-link-label">Dashboard</span>
        </button>
        <button class="nav-link" data-page="live" onclick="navigate('live')">
          <span class="nav-link-icon">🔴</span>
          <span class="nav-link-label">Live Feed</span>
        </button>
        <button class="nav-link" data-page="playback" onclick="navigate('playback')">
          <span class="nav-link-icon">📼</span>
          <span class="nav-link-label">Playback</span>
        </button>
        <button class="nav-link" data-page="cameras" onclick="navigate('cameras')">
          <span class="nav-link-icon">📹</span>
          <span class="nav-link-label">Cameras</span>
        </button>
        <button class="nav-link" data-page="users" onclick="navigate('users')">
          <span class="nav-link-icon">👥</span>
          <span class="nav-link-label">Users</span>
        </button>
        <button class="nav-link" data-page="settings" onclick="navigate('settings')">
          <span class="nav-link-icon">⚙️</span>
          <span class="nav-link-label">Settings</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div style="display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px">
          <span style="width:8px;height:8px;background:var(--success);border-radius:50%"></span>
          <span id="backend-status">Backend Connected</span>
        </div>
        <button class="btn btn-danger btn-sm" style="width:100%" onclick="doLogout()">🚪 Logout</button>
      </div>
    </aside>

    <!-- Navbar -->
    <header id="navbar">
      <div class="navbar-left">
        <h2 class="page-title" id="page-title" style="font-size:1.25rem;font-weight:600">Dashboard</h2>
      </div>
      <div class="navbar-right">
        <span style="font-size:0.875rem;color:var(--text-secondary)" id="current-time"></span>
        <button class="navbar-icon-btn" title="Notifications">🔔</button>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:32px;height:32px;background:var(--accent-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:600" id="navbar-avatar">A</div>
          <span style="font-size:0.875rem;font-weight:500" id="navbar-name">Admin</span>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main id="page-content">
      <!-- Content injected by JavaScript -->
    </main>
  </div>

  <script>
    // ==================== CONFIGURATION ====================
    const API_CONFIG = {
      BASE_URL: 'http://10.251.83.27:8000',  // ← UPDATE: Your backend IP
      API_VERSION: '/api/v1',
      TIMEOUT: 30000,
    };

    const ENDPOINTS = {
      AUTH: { LOGIN: '/auth/login', LOGOUT: '/auth/logout', ME: '/auth/me' },
      CAMERAS: { LIST: '/cameras', DETAIL: (id) => `/cameras/${id}` },
      STREAM: { LIVE: '/stream/live', PLAYBACK: '/stream/playback' },
      AI: { RISK_SCORE: (id) => `/risk/score/${id}`, EVENTS: '/events' },
      USERS: { LIST: '/users', CREATE: '/users', DELETE: (id) => `/users/${id}` },
      SYSTEM: { HEALTH: '/health', SETTINGS: '/settings', STATS: '/dashboard/stats' },
    };

    // Demo data fallback
    const DEMO_CAMERAS = [
      { id: 1, name: 'Entrance Main', location: 'Front Door', status: 'online', ip: '192.168.1.101' },
      { id: 2, name: 'Parking Lot A', location: 'North Parking', status: 'online', ip: '192.168.1.102' },
      { id: 3, name: 'Warehouse Entry', location: 'Loading Dock', status: 'offline', ip: '192.168.1.103' },
      { id: 4, name: 'Office Hallway', location: '2nd Floor', status: 'online', ip: '192.168.1.104' },
    ];

    const DEMO_USERS = [
      { id: 1, name: 'Security Admin', email: 'admin@cctv.com', role: 'admin', status: 'active' },
      { id: 2, name: 'Security Officer', email: 'officer@cctv.com', role: 'officer', status: 'active' },
      { id: 3, name: 'Viewer', email: 'viewer@cctv.com', role: 'viewer', status: 'inactive' },
    ];

    const DEMO_EVENTS = [
      { id: 101, event_type: 'person_detected', risk_level: 'high', description: 'Person in restricted area', timestamp: new Date().toISOString() },
      { id: 102, event_type: 'motion_detected', risk_level: 'low', description: 'Motion detected', timestamp: new Date().toISOString() },
      { id: 103, event_type: 'vehicle_detected', risk_level: 'medium', description: 'Vehicle in unauthorized zone', timestamp: new Date().toISOString() },
    ];

    // ==================== API CLIENT ====================
    const api = {
      token: localStorage.getItem('cctv_token') || null,
      setToken(token) { this.token = token; localStorage.setItem('cctv_token', token); },
      clearToken() { this.token = null; localStorage.removeItem('cctv_token'); },
      
      async _request(endpoint, options = {}) {
        const url = endpoint.startsWith('http') ? endpoint : `${API_CONFIG.BASE_URL}${API_CONFIG.API_VERSION}${endpoint}`;
        const config = {
          method: 'GET',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', ...options.headers },
          ...options,
        };
        if (this.token) config.headers['Authorization'] = `Bearer ${this.token}`;
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), API_CONFIG.TIMEOUT);
          const response = await fetch(url, { ...config, signal: controller.signal });
          clearTimeout(timeoutId);
          if (!response.ok) { const error = await response.json().catch(() => ({})); throw new Error(error.message || `HTTP ${response.status}`); }
          const data = await response.json().catch(() => null);
          return data || {};
        } catch (error) { console.error('API Request Failed:', error.message); return null; }
      },
      
      async login(email, password) {
        try {
          const result = await this._request(ENDPOINTS.AUTH.LOGIN, { method: 'POST', body: JSON.stringify({ email, password }) });
          if (result?.access_token) {
            this.setToken(result.access_token);
            const user = result.user || { email, role: 'admin', name: email.split('@')[0] };
            localStorage.setItem('cctv_user', JSON.stringify(user));
          }
          return result;
        } catch (error) { return null; }
      },
      
      async logout() { await this._request(ENDPOINTS.AUTH.LOGOUT, { method: 'POST' }); this.clearToken(); localStorage.removeItem('cctv_user'); },
      async getCurrentUser() { return await this._request(ENDPOINTS.AUTH.ME); },
      async getCameras(params = {}) {
        const queryString = new URLSearchParams(params).toString();
        const endpoint = queryString ? `${ENDPOINTS.CAMERAS.LIST}?${queryString}` : ENDPOINTS.CAMERAS.LIST;
        const result = await this._request(endpoint);
        return result?.cameras || [];
      },
      async getEvents(limit = 50) {
        const result = await this._request(`${ENDPOINTS.AI.EVENTS}?limit=${limit}`);
        return result?.events || [];
      },
      async getRiskScore(cameraId) { return await this._request(ENDPOINTS.AI.RISK_SCORE(cameraId)); },
      async getUsers() { const result = await this._request(ENDPOINTS.USERS.LIST); return result?.users || []; },
      async getStats() { return await this._request(ENDPOINTS.SYSTEM.STATS); },
      async healthCheck() { const result = await this._request(ENDPOINTS.SYSTEM.HEALTH); return result?.status === 'healthy'; },
      getLiveStreamUrl(cameraId) { return `${API_CONFIG.BASE_URL}${API_CONFIG.API_VERSION}${ENDPOINTS.STREAM.LIVE}?camera_id=${cameraId}`; },
    };

    // ==================== AUTH CHECK ====================
    const userStr = localStorage.getItem('cctv_user');
    const token = localStorage.getItem('cctv_token');
    if (!token || !userStr) { window.location.href = 'officer.html'; }
    const user = JSON.parse(userStr);
    if (user.role !== 'admin') { window.location.href = 'officer.html'; }

    // ==================== NAVIGATION ====================
    function navigate(page) {
      document.querySelectorAll('.nav-link').forEach(link => link.classList.toggle('active', link.dataset.page === page));
      document.getElementById('page-title').textContent = page.charAt(0).toUpperCase() + page.slice(1);
      renderPage(page);
    }

    function logout() {
      api.logout();
      window.location.href = 'officer.html';
    }

    function doLogout() {
      localStorage.removeItem('cctv_token');
      localStorage.removeItem('cctv_user');
      window.location.href = 'index.html';  // ✅ Redirect to login page
    }
    function renderPage(page) {
      const content = document.getElementById('page-content');
      switch(page) {
        case 'dashboard': content.innerHTML = renderDashboard(); break;
        case 'live': content.innerHTML = renderLiveFeed(); break;
        case 'playback': content.innerHTML = renderPlayback(); break;
        case 'cameras': content.innerHTML = renderCameras(); break;
        case 'users': content.innerHTML = renderUsers(); break;
        case 'settings': content.innerHTML = renderSettings(); break;
        default: content.innerHTML = '<div class="alert alert-warning">Page not found</div>';
      }
    }

    function renderDashboard() {
      return `
        <div class="page-header">
          <h1 class="page-title-large">📊 Admin Dashboard</h1>
          <p class="page-subtitle">System overview and quick access</p>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon">📹</div><div class="stat-value">${DEMO_CAMERAS.length}</div><div class="stat-label">Total Cameras</div></div>
          <div class="stat-card"><div class="stat-icon">🟢</div><div class="stat-value">${DEMO_CAMERAS.filter(c=>c.status==='online').length}</div><div class="stat-label">Online</div></div>
          <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value">${DEMO_EVENTS.filter(e=>e.risk_level==='high').length}</div><div class="stat-label">High Risk Alerts</div></div>
          <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${DEMO_USERS.length}</div><div class="stat-label">Users</div></div>
        </div>
        <h3 class="mb-md">📹 Camera Overview</h3>
        <div class="camera-grid">
          ${DEMO_CAMERAS.map(cam => `
            <div class="camera-card" onclick="navigate('live')">
              <div class="camera-card-header">
                <span class="camera-card-name">📹 ${cam.name}</span>
                <span class="badge ${cam.status==='online'?'badge-success':'badge-danger'}">${cam.status}</span>
              </div>
              <div class="camera-card-preview">${cam.status==='online'?'📡 Live Feed':'⚠️ Offline'}</div>
              <div class="camera-card-footer"><span>📍 ${cam.location}</span><span>ID: ${cam.id}</span></div>
            </div>
          `).join('')}
        </div>
        <h3 class="mb-md" style="margin-top:24px">🔔 Recent Alerts</h3>
        <div class="event-timeline">
          ${DEMO_EVENTS.map(event => `
            <div class="event-item ${event.risk_level==='high'?'high-risk':event.risk_level==='medium'?'medium-risk':'low-risk'}">
              <div class="event-item-header">
                <strong>${event.event_type?.replace('_',' ').toUpperCase()}</strong>
                <span class="event-item-time">${new Date(event.timestamp).toLocaleTimeString()}</span>
              </div>
              <div class="event-item-description">${event.description}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderLiveFeed() {
      return `
        <div class="page-header">
          <h1 class="page-title-large">🔴 Live Feed Monitoring</h1>
          <p class="page-subtitle">Real-time camera streams with AI analysis</p>
        </div>
        <div class="card mb-lg" style="background:var(--bg-secondary);padding:var(--spacing-md);border-radius:var(--border-radius-lg);border:1px solid var(--border-color)">
          <div class="form-group" style="margin:0">
            <label>Select Camera</label>
            <select id="camera-select" onchange="updateLiveStream(this.value)">
              ${DEMO_CAMERAS.map(c => `<option value="${c.id}">${c.name} (${c.status})</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="video-player-container">
          <div class="video-player-header">
            <span class="video-player-title" id="stream-title">📹 Entrance Main - Live</span>
            <span class="live-badge">LIVE</span>
          </div>
          <div class="video-player-content">
            <video id="live-video" autoplay muted playsinline>
              <source src="% url 'video_feed' 0 %" width="600">
              📡 Connecting to stream...
            </video>
          </div>
        </div>
        <div class="grid-2">
          <div class="stat-card" style="text-align:left">
            <h4 class="mb-md">🤖 AI Risk Analysis</h4>
            <div style="display:flex;align-items:center;gap:16px">
              <div style="width:80px;height:80px;background:var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:white">35%</div>
              <div><div style="font-size:1.25rem;font-weight:600;color:var(--success)">LOW RISK</div><div style="color:var(--text-secondary)">AI Analysis Score: 0.35</div></div>
            </div>
          </div>
          <div class="stat-card" style="text-align:left">
            <h4 class="mb-md">🔍 Detected Objects</h4>
            <div style="color:var(--text-secondary)">
              <div>👤 Person (2)</div>
              <div>🚗 Vehicle (1)</div>
              <div>🎒 Bag (1)</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPlayback() {
      return `
        <div class="page-header">
          <h1 class="page-title-large">📼 Video Playback</h1>
          <p class="page-subtitle">Review historical footage and events</p>
        </div>
        <div class="grid-4 mb-lg">
          <div class="form-group" style="margin:0"><label>Camera</label><select><option>All Cameras</option>${DEMO_CAMERAS.map(c=>`<option>${c.name}</option>`).join('')}</select></div>
          <div class="form-group" style="margin:0"><label>Date</label><input type="date" value="${new Date().toISOString().split('T')[0]}"/></div>
          <div class="form-group" style="margin:0"><label>Start Time</label><input type="time" value="00:00"/></div>
          <div class="form-group" style="margin:0"><label>End Time</label><input type="time" value="23:59"/></div>
        </div>
        <button class="btn mb-lg">🔍 Search Footage</button>
        <div class="video-player-container">
          <div class="video-player-header"><span class="video-player-title">📼 Playback</span></div>
          <div class="video-player-content">📼 Select date/time and click Search</div>
        </div>
        <h3 class="mb-md" style="margin-top:24px">📋 Detected Events</h3>
        <div class="event-timeline">${DEMO_EVENTS.map(e=>`<div class="event-item ${e.risk_level==='high'?'high-risk':e.risk_level==='medium'?'medium-risk':'low-risk'}"><div class="event-item-header"><strong>${e.event_type?.replace('_',' ').toUpperCase()}</strong><span class="event-item-time">${new Date(e.timestamp).toLocaleTimeString()}</span></div><div class="event-item-description">${e.description}</div></div>`).join('')}</div>
      `;
    }

    function renderCameras() {
      return `
        <div class="page-header">
          <h1 class="page-title-large">📹 Camera Management</h1>
          <p class="page-subtitle">Add, edit, or remove security cameras</p>
        </div>
        <button class="btn btn-lg mb-lg" onclick="alert('Add camera form would open here')">➕ Add New Camera</button>
        <table class="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Location</th><th>IP Address</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${DEMO_CAMERAS.map(c => `
              <tr>
                <td>${c.id}</td>
                <td>📹 ${c.name}</td>
                <td>📍 ${c.location}</td>
                <td><code style="background:var(--bg-tertiary);padding:2px 6px;border-radius:4px">${c.ip}</code></td>
                <td><span class="badge ${c.status==='online'?'badge-success':'badge-danger'}">${c.status}</span></td>
                <td><button class="btn btn-sm">✏️</button> <button class="btn btn-sm btn-danger">🗑️</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderUsers() {
      return `
        <div class="page-header">
          <h1 class="page-title-large">👥 User Management</h1>
          <p class="page-subtitle">Manage security officers and system access</p>
        </div>
        <button class="btn btn-lg mb-lg" onclick="alert('Add user form would open here')">➕ Add New User</button>
        <table class="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${DEMO_USERS.map(u => `
              <tr>
                <td>${u.id}</td>
                <td>👤 ${u.name}</td>
                <td>${u.email}</td>
                <td><span class="badge badge-info">${u.role}</span></td>
                <td><span class="badge ${u.status==='active'?'badge-success':'badge-danger'}">${u.status}</span></td>
                <td><button class="btn btn-sm">✏️</button> <button class="btn btn-sm btn-danger">🗑️</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderSettings() {
      return `
        <div class="page-header">
          <h1 class="page-title-large">⚙️ System Settings</h1>
          <p class="page-subtitle">Configure system parameters and preferences</p>
        </div>
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('general',this)">🔧 General</button>
          <button class="tab-btn" onclick="switchTab('security',this)">🔐 Security</button>
          <button class="tab-btn" onclick="switchTab('cameras',this)">📹 Cameras</button>
          <button class="tab-btn" onclick="switchTab('notifications',this)">🔔 Notifications</button>
        </div>
        <div id="tab-general" class="tab-content active">
          <div class="stat-card" style="text-align:left;max-width:600px">
            <div class="form-group"><label>System Name</label><input type="text" value="CCTV AI Security System"/></div>
            <div class="form-group"><label>API Base URL</label><input type="text" value="${API_CONFIG.BASE_URL}"/></div>
            <div class="form-group"><label>Refresh Interval (seconds)</label><input type="number" min="1" max="300" value="5"/></div>
            <button class="btn" onclick="alert('Settings saved!')">💾 Save General Settings</button>
          </div>
        </div>
        <div id="tab-security" class="tab-content">
          <div class="stat-card" style="text-align:left;max-width:600px">
            <div class="form-group"><label>Session Timeout (minutes)</label><input type="number" min="5" max="480" value="60"/></div>
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><input type="checkbox" checked style="width:auto"/> Require Password Change Every 90 Days</label>
            <button class="btn" onclick="alert('Security settings saved!')">💾 Save Security Settings</button>
          </div>
        </div>
        <div id="tab-cameras" class="tab-content">
          <div class="stat-card" style="text-align:left;max-width:600px">
            <div class="form-group"><label>Maximum Cameras Allowed</label><input type="number" min="1" max="100" value="50"/></div>
            <div class="form-group"><label>Default Recording Quality</label><select><option>720p</option><option selected>1080p</option><option>4K</option></select></div>
            <button class="btn" onclick="alert('Camera settings saved!')">💾 Save Camera Settings</button>
          </div>
        </div>
        <div id="tab-notifications" class="tab-content">
          <div class="stat-card" style="text-align:left;max-width:600px">
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><input type="checkbox" checked style="width:auto"/> Email Alerts</label>
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><input type="checkbox" style="width:auto"/> SMS Alerts</label>
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><input type="checkbox" checked style="width:auto"/> Desktop Notifications</label>
            <button class="btn" onclick="alert('Notification settings saved!')">💾 Save Notification Settings</button>
          </div>
        </div>
      `;
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      btn.classList.add('active');
    }

    function updateLiveStream(cameraId) {
      const camera = DEMO_CAMERAS.find(c => c.id == cameraId);
      document.getElementById('stream-title').textContent = `📹 ${camera.name} - Live`;
      document.getElementById('live-video').querySelector('source').src = api.getLiveStreamUrl(cameraId);
      document.getElementById('live-video').load();
    }

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', () => {
      // Set user info
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();
      document.getElementById('navbar-name').textContent = user.name.split(' ')[0];
      document.getElementById('navbar-avatar').textContent = user.name.charAt(0).toUpperCase();
      
      // Update time
      function updateTime() {
        const now = new Date();
        document.getElementById('current-time').textContent = now.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }
      updateTime();
      setInterval(updateTime, 60000);
      
      // Check backend status
      api.healthCheck().then(healthy => {
        const statusEl = document.getElementById('backend-status');
        const dotEl = statusEl.previousElementSibling;
        if (healthy) {
          statusEl.textContent = 'Backend Connected';
          dotEl.style.background = 'var(--success)';
        } else {
          statusEl.textContent = 'Demo Mode';
          dotEl.style.background = 'var(--warning)';
        }
      });
      
      // Initial page render
      renderPage('dashboard');
    });
  </script>
</body>
</html>
