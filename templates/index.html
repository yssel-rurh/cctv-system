<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTV AI Security System - Login</title>
  
  {% load static %}

  <!-- External CSS Files -->
  <link rel="stylesheet" href="{% static 'css/variable.css' %}">
  <link rel="stylesheet" href="{% static 'css/global.css' %}">
  <link rel="stylesheet" href="{% static 'css/component.css' %}">
  <link rel="stylesheet" href="{% static 'css/pages.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
  
  <!-- Login Page Specific Styles -->
  <style>
    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--spacing-lg);
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: var(--spacing-xl);
      background-color: var(--bg-secondary);
      border-radius: var(--border-radius-lg);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
    }
    .login-header { text-align: center; margin-bottom: var(--spacing-xl); }
    .login-logo { font-size: 3rem; margin-bottom: var(--spacing-sm); }
    .login-title { font-size: var(--font-size-xl); color: var(--accent-primary); margin-bottom: var(--spacing-xs); font-weight: 700; }
    .login-subtitle { color: var(--text-secondary); font-size: var(--font-size-sm); }
    .form-group { margin-bottom: var(--spacing-md); }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--accent-primary); }
    .btn {
      width: 100%;
      padding: 12px;
      background-color: var(--accent-primary);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover { background-color: var(--accent-hover); }
    .alert {
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--border-radius);
      margin-bottom: var(--spacing-md);
      border-left: 4px solid;
    }
    .alert-danger {
      background-color: rgba(239, 68, 68, 0.1);
      border-color: var(--danger);
      color: var(--danger);
    }
  </style>
</head>

<body>
  <div class="login-container">
    
    <div class="login-header">
      <div class="login-logo">🎥</div>
      <h1 class="login-title">CCTV AI Security System</h1>
      <p class="login-subtitle">Secure Access Portal</p>
    </div>
    
    <!-- Django Error Display -->
    {% if error %}
      <div class="alert alert-danger">
        {{ error }}
      </div>
    {% endif %}
    
    <!-- FORM NOW POSTS TO DJANGO -->
    <form method="POST" action="{% url 'login' %}" class="login-form">
      {% csrf_token %}
      
      <div class="form-group">
        <label>📧 Username</label>
        <input type="text" name="username" placeholder="Enter username" required />
      </div>
      
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      
      <button type="submit" class="btn">🔐 SIGN IN </button>
    </form>

  </div>
</body>
</html>
