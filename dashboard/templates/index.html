{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCTV AI Security System - Login</title>
  <link rel="stylesheet" href="{% static 'dashboard/css/styles.css' %}"></head>
<body>
  <main class="login-page">
    <section class="login-panel">
      <div class="login-header">
        <div class="login-logo">🎥</div>
        <h1>CCTV AI Security System</h1>
        <p>Enter your credentials to access the backend.</p>
      </div>

      <form class="login-form" action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="admin" required autocomplete="username">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password">

        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
    </section>
  </main>
</body>
</html>
